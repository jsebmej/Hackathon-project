<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prueba Google + Llama</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header>
          <p class="eyebrow">Backend local</p>
          <h1>Google + Llama 3.2</h1>
        </header>

        <label class="field">
          <span>Google Client ID</span>
          <input id="clientIdInput" type="text" placeholder="xxxxx.apps.googleusercontent.com" autocomplete="off" />
        </label>

        <div class="actions">
          <button id="initGoogleButton" type="button">Preparar login</button>
          <button id="logoutButton" type="button" disabled>Cerrar sesion</button>
        </div>

        <div id="googleButton" class="google-slot"></div>

        <div class="status-row">
          <span id="authStatus" class="status">Sin autenticar</span>
          <button id="checkMeButton" type="button" disabled>Probar /auth/me</button>
        </div>
      </section>

      <section class="panel chat-panel">
        <header>
          <p class="eyebrow">Pregunta local</p>
          <h2>Chat</h2>
        </header>

        <div id="messages" class="messages"></div>

        <form id="chatForm" class="chat-form">
          <textarea id="messageInput" rows="3" placeholder="Escribe una pregunta para llama3.2..." disabled></textarea>
          <button id="sendButton" type="submit" disabled>Enviar</button>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
